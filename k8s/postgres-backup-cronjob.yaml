apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup-job
  namespace: citizen-portal
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          # Core Fix: Matches network policy selector rules to allow traffic
          labels:
            app: backend
        spec:
          containers:
          - name: postgres-backup
            image: postgres:15-alpine
            envFrom:
            - secretRef:
                name: citizen-portal-secret
            command:
            - /bin/sh
            - -c
            - |
              echo "Starting database backup process..."
              
              export PGPASSWORD=$POSTGRES_PASSWORD
              DB_HOST_TARGET="db-rw"
              DB_USER_TARGET=$POSTGRES_USER
              DB_NAME_TARGET=$POSTGRES_DB

              FILENAME="citizen_portal_backup_$(date +%Y%m%d_%H%M%S).sql"
              
              echo "Connecting to host: $DB_HOST_TARGET as user: $DB_USER_TARGET on DB: $DB_NAME_TARGET..."
              pg_dump -h $DB_HOST_TARGET -U $DB_USER_TARGET -d $DB_NAME_TARGET > /backup/$FILENAME
              
              if [ $? -eq 0 ]; then
                echo "SUCCESS: Backup saved to storage volume as $FILENAME"
              else
                echo "ERROR: Backup execution failed!" && exit 1
              fi
            volumeMounts:
            - mountPath: /backup
              name: backup-volume
          restartPolicy: OnFailure
          volumes:
          - name: backup-volume
            persistentVolumeClaim:
              claimName: postgres-backup-pvc
