apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-frontend-sa
  labels:
    release: {{ .Release.Name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-backend-sa
  labels:
    release: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-namespace-reader
  labels:
    release: {{ .Release.Name }}
rules:
- apiGroups: ["", "apps", "autoscaling", "networking.k8s.io"]
  resources: ["pods", "pods/log", "deployments", "services", "ingresses", "endpoints", "horizontalpodautoscalers", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-developer-reader-binding
  labels:
    release: {{ .Release.Name }}
subjects:
- kind: Group
  name: "my-company:developers"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: {{ .Release.Name }}-namespace-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-cluster-resource-reader
  labels:
    release: {{ .Release.Name }}
rules:
- apiGroups: [""]
  resources: ["nodes", "persistentvolumes", "storageclasses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-developer-cluster-reader-binding
  labels:
    release: {{ .Release.Name }}
subjects:
- kind: Group
  name: "my-company:developers"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-cluster-resource-reader
  apiGroup: rbac.authorization.k8s.io
---
# Role for backend-sa to read secrets and configmaps (required for backup/scripts operations)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-backend-workload-role
  labels:
    release: {{ .Release.Name }}
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-backend-workload-binding
  labels:
    release: {{ .Release.Name }}
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-backend-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-backend-workload-role
  apiGroup: rbac.authorization.k8s.io
