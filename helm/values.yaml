# Cloud-Native Citizen Portal Helm Configurations
global:
  environment: production
  clusterType: k3s-5node-ha

# Frontend Microservice Configuration
frontend:
  replicaCount: 2
  image:
    repository: citizen-portal-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80

# Backend Microservice Configuration
backend:
  replicaCount: 2
  image:
    repository: citizen-portal-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000

# Horizontal Pod Autoscaler (HPA) Configurations
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
